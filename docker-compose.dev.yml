version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: deenflow_dev
      POSTGRES_USER: deenflow_app
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U deenflow_app -d deenflow_dev" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
