# =============================================================
#  PostgreSQL — Primary Node Configuration
#  /etc/postgresql/postgresql.conf
#
#  Tuned for:
#   - Security: TLS only, no trust auth
#   - Reliability: WAL archiving + streaming replication
#   - Performance: shared_buffers = 25% RAM (adjust per server)
# =============================================================

# ─── Connection Settings ──────────────────────────────────────
listen_addresses = 'localhost'      # PgBouncer is on the same db_net — restrict further
                                    # In Docker, use '*' since Docker handles network isolation
listen_addresses = '*'              # Docker network handles isolation via db_net (internal: true)
max_connections = 100               # PgBouncer multiplexes, so 100 real connections is enough
superuser_reserved_connections = 3

# ─── TLS / SSL ───────────────────────────────────────────────
ssl = on
ssl_cert_file = '/etc/postgresql/ssl/server.crt'
ssl_key_file  = '/etc/postgresql/ssl/server.key'
ssl_ca_file   = '/etc/postgresql/ssl/ca.crt'
ssl_min_protocol_version = 'TLSv1.2'
ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'
# Force clients to verify server cert (set in pg_hba.conf via hostssl + clientcert=verify-full)

# ─── Shared Memory / Performance ─────────────────────────────
shared_buffers = 256MB              # 25% of server RAM — adjust (e.g., 4GB on 16GB server)
effective_cache_size = 768MB        # 75% of server RAM — hints the planner
work_mem = 16MB                     # per sort/hash operation; watch for OOM under many connections
maintenance_work_mem = 128MB        # VACUUM, CREATE INDEX, etc.
wal_buffers = 16MB
checkpoint_completion_target = 0.9

# ─── WAL — Write-Ahead Log (Required for replication + PITR) ──
wal_level = replica                 # Required for streaming replication
max_wal_senders = 5                 # one per replica + some headroom
wal_keep_size = 1GB                 # keep 1 GB of WAL segments on primary
wal_log_hints = on                  # required for pg_rewind
full_page_writes = on               # required for crash recovery

# ─── WAL Archiving — Point-in-Time Recovery ──────────────────
archive_mode = on
archive_command = 'aws s3 cp %p s3://deenflow-db-backups/wal/%f'
# Alternative (local): 'test ! -f /mnt/wal_archive/%f && cp %p /mnt/wal_archive/%f'
# On restore: restore_command = 'aws s3 cp s3://deenflow-db-backups/wal/%f %p'
archive_timeout = 300               # Archive segment every 5 min even if not full

# ─── Replication ─────────────────────────────────────────────
hot_standby = on                    # Allow replicas to serve read queries
synchronous_commit = local          # Async for replicas — balances performance vs. durability
                                    # Set to 'on' for zero data loss (at write latency cost)
max_replication_slots = 5
max_slot_wal_keep_size = 2GB

# ─── Logging ─────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off             # Docker handles log collection
log_min_duration_statement = 300    # Log queries slower than 300ms (slow-query log)
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p]: [%l-1] db=%d,user=%u,app=%a,client=%h '
log_lock_waits = on
log_temp_files = 0                  # Log all temp files (indicate missing indexes)
log_autovacuum_min_duration = 1000  # Log auto-vacuums > 1s

# ─── Auto-vacuum (keep tables healthy) ───────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_cost_delay = 2ms

# ─── Monitoring ──────────────────────────────────────────────
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
track_activities = on
track_counts = on
track_io_timing = on                # Required for meaningful pg_stat_statements data
