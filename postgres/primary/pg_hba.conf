# =============================================================
#  PostgreSQL — pg_hba.conf (Host-Based Authentication)
#  Primary Node
#
#  Rules are evaluated TOP-TO-BOTTOM — first match wins.
#
#  Auth methods used:
#    scram-sha-256  — strong password hashing (Postgres 10+)
#    reject         — deny immediately
#    trust          — NEVER used outside of local admin socket
#
#  TLS is enforced on ALL TCP connections (hostssl lines only).
#  Plain 'host' lines are intentionally absent — no plaintext.
# =============================================================

# TYPE  DATABASE        USER                ADDRESS         METHOD

# ─── Local unix socket (used by maintenance scripts inside the container) ──
local   all             postgres                            peer
local   all             all                                 reject

# ─── Localhost (pgbouncer on same Docker network) ─────────────────────────
# PgBouncer connects over TCP; TLS required even on the private network.

# App role — can read/write application tables
hostssl deenflow_prod   deenflow_app        172.20.0.0/16   scram-sha-256

# Read-only role — analytics queries, reporting
hostssl deenflow_prod   deenflow_readonly   172.20.0.0/16   scram-sha-256

# Replication role — used by streaming replica
hostssl replication     deenflow_replicator 172.20.0.0/16   scram-sha-256

# Monitoring role — pg_stat_* views only
hostssl deenflow_prod   postgres_monitor    172.20.0.0/16   scram-sha-256

# ─── Deny everything else ─────────────────────────────────────────────────
host    all             all                 all             reject
hostssl all             all                 all             reject
