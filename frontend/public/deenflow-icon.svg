<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="crescentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle (optional, remove for transparent) -->
  <!-- <circle cx="40" cy="40" r="40" fill="#F0F7F0"/> -->

  <!-- Crescent D shape -->
  <path d="M 8 8 L 8 72 Q 8 72 40 72 Q 74 72 74 40 Q 74 8 40 8 Z"
    fill="url(#crescentGrad)" filter="url(#glow)"/>

  <!-- Inner white cutout -->
  <path d="M 22 20 L 22 60 Q 22 60 38 60 Q 60 60 60 40 Q 60 20 38 20 Z"
    fill="white"/>

  <!-- Crescent bite -->
  <ellipse cx="30" cy="40" rx="14" ry="22" fill="white"/>

  <!-- Flowing spiritual lines inside crescent -->
  <path d="M 12 28 Q 20 25 17 34 Q 14 43 22 40" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M 10 42 Q 18 39 15 49 Q 12 57 20 54" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M 13 18 Q 21 15 18 24" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M 11 56 Q 19 53 17 62" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.75"/>

  <!-- Star above -->
  <g transform="translate(46, 4)" filter="url(#glow)">
    <polygon points="6,0 7.4,4.5 12,4.5 8.3,7.3 9.7,12 6,9.3 2.3,12 3.7,7.3 0,4.5 4.6,4.5"
      fill="#FFD700"/>
  </g>
</svg>
