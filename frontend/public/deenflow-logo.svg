<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <!-- Green to Gold gradient for crescent -->
    <linearGradient id="crescentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== SYMBOL: Crescent forming the "D" ===== -->
  <!-- Outer D shape (full circle arc) -->
  <path
    d="M 10 10 L 10 70 Q 10 70 40 70 Q 72 70 72 40 Q 72 10 40 10 Z"
    fill="url(#crescentGrad)"
    filter="url(#glow)"
  />
  <!-- Inner cutout to create crescent/D shape -->
  <path
    d="M 22 20 L 22 60 Q 22 60 38 60 Q 60 60 60 40 Q 60 20 38 20 Z"
    fill="white"
  />
  <!-- Second inner cutout (crescent moon bite) -->
  <ellipse cx="30" cy="40" rx="14" ry="20" fill="white"/>

  <!-- Flowing lines inside the crescent (spiritual flow / Qur'an pages) -->
  <path d="M 14 30 Q 20 28 18 35 Q 16 42 22 40" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 12 40 Q 19 38 17 46 Q 15 52 21 50" stroke="#FFD700" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M 15 22 Q 22 20 20 28" stroke="#FFD700" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 13 52 Q 20 50 19 57" stroke="#FFD700" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Star / guidance dot above crescent -->
  <g transform="translate(44, 6)" filter="url(#glow)">
    <polygon points="5,0 6.2,3.8 10,3.8 7,6.1 8.1,10 5,7.8 1.9,10 3,6.1 0,3.8 3.8,3.8"
      fill="#FFD700" opacity="0.95"/>
  </g>

  <!-- ===== WORDMARK: "DeenFlow" ===== -->
  <!-- "Deen" in dark green -->
  <text
    x="84"
    y="52"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="-0.5"
    fill="#1B5E20"
  >Deen</text>

  <!-- "Flow" in gradient green-to-gold -->
  <text
    x="192"
    y="52"
    font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="34"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#crescentGrad)"
  >Flow</text>

  <!-- Subtle tagline -->
  <text
    x="85"
    y="66"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="9"
    font-weight="500"
    letter-spacing="2.5"
    fill="#2E7D32"
    opacity="0.7"
  >ISLAMIC GUIDANCE PLATFORM</text>
</svg>
