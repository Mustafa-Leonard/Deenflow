<!doctype html>

<head>
  <meta charset="utf-8" />

  <title>DeenFlow — Islamic Guidance Platform</title>
  <meta name="description"
    content="DeenFlow — AI-powered Islamic guidance, Qur'an reading, and spiritual growth platform." />
  <link rel="icon" type="image/svg+xml" href="/deenflow-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap"
    rel="stylesheet">

  <!--
    THEME FLASH PREVENTION — runs synchronously before any paint.
    Reads the saved theme from localStorage and immediately stamps
    the `dark` class + `color-scheme` on <html> so the browser
    never renders the wrong palette even for a single frame.
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = saved ? saved === 'dark' : prefersDark;
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = 'light';
        }
      } catch (e) { /* localStorage may be blocked in private mode */ }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
